<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director Dashboard - HDCRS V4</title>
  <style>
    :root { --primary: #00695C; --primary-dark: #004D40; --bg: #F5E4D0; --card: white; --text: #3E2723; --border: #D7CCC8; --danger: #C44536; --warn: #E65100; --success: #2E7D32; }
    * { box-sizing: border-box; }
    body { background: var(--bg); font-family: system-ui, sans-serif; margin: 0; padding: 1rem; color: var(--text); }
    .login-box, .container { max-width: 1300px; width: 100%; margin: 0 auto; background: var(--card); border-radius: 20px; padding: 1.5rem; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .login-box { max-width: 400px; text-align: center; margin-top: 3rem; }
    .login-box h2, .container h1 { color: var(--primary); margin: 0 0 1rem; }
    .login-box input { width: 100%; padding: 0.6rem; margin: 0.4rem 0; border: 1px solid var(--border); border-radius: 8px; }
    .btn { padding: 0.4rem 1rem; border: none; border-radius: 16px; cursor: pointer; font-weight: 600; margin: 0.15rem; font-size: 0.85rem; }
    .approve { background: var(--primary); color: white; }
    .reject { background: var(--danger); color: white; }
    .view { background: #5D4037; color: white; }
    .btn:hover { opacity: 0.85; }
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.85rem; }
    th { background: #f3e7da; color: var(--text); padding: 0.5rem; text-align: left; border-bottom: 2px solid var(--primary); font-weight: 600; }
    td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); }
    .badge { padding: 0.15rem 0.6rem; border-radius: 10px; font-weight: 600; font-size: 0.8rem; display: inline-block; }
    .Pending { background: #FFF3E0; color: #E65100; }
    .Approved { background: #E0F2F1; color: var(--primary); }
    .Rejected { background: #FFEBEE; color: var(--danger); }
    .error { color: var(--danger); margin-top: 0.5rem; min-height: 1.2rem; font-size: 0.9rem; }
    .login-logo { max-width: 140px; margin-bottom: 0.5rem; }
    .dashboard-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .dashboard-header img { height: 36px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 16px; padding: 1.5rem; max-width: 900px; width: 95%; max-height: 90vh; overflow-y: auto; }
    .modal-close { float: right; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #999; }
    .modal-actions { text-align: center; margin-top: 1rem; }
    .section { margin: 1.2rem 0 0.5rem; }
    .section h3 { color: var(--primary); margin: 0 0 0.3rem; font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.2rem; }
    .section table { font-size: 0.82rem; }
    .meta-grid { display: grid; grid-template-columns: 160px 1fr; gap: 0.2rem 10px; font-size: 0.9rem; }
    .meta-grid .label { font-weight: 600; color: #555; }
    .reject-reason { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 8px; margin: 0.5rem 0; font-family: inherit; }
    .photo-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .photo-grid img { max-width: 130px; max-height: 100px; border-radius: 8px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-box">
    <img src="https://raw.githubusercontent.com/halbeeghdcrs-lab/HALBEEG-HDCRS/main/logo.png" alt="Halbeeg Logo" class="login-logo">
    <h2>Director Login</h2>
    <input type="text" id="loginName" placeholder="Full Name">
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="btn approve" id="loginBtn" style="width:100%;padding:0.6rem;margin-top:0.5rem">Login</button>
    <div class="error" id="loginError"></div>
  </div>

  <div id="dashboard" class="container hidden">
    <div class="dashboard-header">
      <img src="https://raw.githubusercontent.com/halbeeghdcrs-lab/HALBEEG-HDCRS/main/logo.png" alt="Halbeeg Logo">
      <h1 style="margin:0">Director Dashboard - Daily Reports</h1>
    </div>
    <p>Logged in as <span id="loggedUser"></span> | <a href="#" id="logoutLink">Logout</a>
       &nbsp;&nbsp;<button class="btn view" id="refreshBtn">Refresh</button></p>
    <div id="reportsTable">Loading...</div>
    <div id="message" class="error"></div>
  </div>

  <div id="reportModal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close" id="modalCloseBtn">X</button>
      <div id="modalContent"></div>
      <div class="modal-actions">
        <textarea id="rejectReason" class="reject-reason" placeholder="Reason for rejection (optional)"></textarea>
        <button class="btn approve" id="modalApproveBtn">Approve</button>
        <button class="btn reject" id="modalRejectBtn">Reject</button>
      </div>
    </div>
  </div>

  <script>
    var API_BASE = 'https://script.google.com/macros/s/AKfycbx14uKC7ZyT991b3jltKDa_a33_cIKFADBzZYeCXsAszlPbsS8-gA2-5hAXTlzJodUl/exec';
    var currentReportId = null;
    var loggedUser = sessionStorage.getItem('hdcre_director');

    document.getElementById('loginBtn').addEventListener('click', attemptLogin);
    document.getElementById('logoutLink').addEventListener('click', function(e) { e.preventDefault(); logout(); });
    document.getElementById('refreshBtn').addEventListener('click', loadReports);
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalApproveBtn').addEventListener('click', function() { approveReport(null, false); });
    document.getElementById('modalRejectBtn').addEventListener('click', function() { approveReport(null, true); });

    if (loggedUser) { showDashboard(loggedUser); }

    function attemptLogin() {
      var name = document.getElementById('loginName').value.trim();
      var pw = document.getElementById('loginPassword').value.trim();
      var err = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');
      err.textContent = '';
      err.style.color = '#C44536';
      if (!name || !pw) { err.textContent = 'Please enter both Name and Password.'; return; }

      btn.disabled = true;
      btn.textContent = 'Checking...';

      var url = API_BASE + '?action=login&name=' + encodeURIComponent(name) + '&password=' + encodeURIComponent(pw);
      console.log('[Director] Login attempt for: ' + name);

      fetch(url)
        .then(function(r) {
          console.log('[Director] Response status: ' + r.status);
          if (!r.ok) throw new Error('Server returned ' + r.status);
          return r.json();
        })
        .then(function(d) {
          console.log('[Director] Response: ' + JSON.stringify(d));
          if (d.success && d.role === 'Director') {
            sessionStorage.setItem('hdcre_director', name);
            showDashboard(name);
          } else if (d.success && d.role) {
            err.textContent = 'Access denied. Your role is: ' + d.role + '. This portal is for Directors only.';
          } else if (d.success) {
            err.textContent = 'Login OK but no role assigned. Check Staff_Accounts sheet.';
          } else {
            err.textContent = 'Invalid name or password. Check Staff_Accounts sheet.';
          }
        })
        .catch(function(e) {
          console.error('[Director] Login error: ' + e.message);
          if (e.message.indexOf('Failed to fetch') !== -1) {
            err.textContent = 'Network error. Cannot reach server.';
          } else {
            err.textContent = 'Error: ' + e.message;
          }
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = 'Login';
        });
    }

    function showDashboard(name) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('loggedUser').textContent = name;
      loadReports();
    }

    function logout() {
      sessionStorage.removeItem('hdcre_director');
      location.reload();
    }

    function loadReports() {
      fetch(API_BASE + '?endpoint=reports')
        .then(function(r) { return r.json(); })
        .then(function(reports) {
          var html = '<table><tr><th>ID</th><th>Site</th><th>Date</th><th>RE</th><th>Weather</th><th>Efficiency</th><th>Status</th><th>Actions</th></tr>';
          if (reports.length === 0) {
            html += '<tr><td colspan="8">No reports.</td></tr>';
          } else {
            for (var i = 0; i < reports.length; i++) {
              var r = reports[i];
              html += '<tr><td style="font-size:0.75rem">' + r.id + '</td><td>' + r.site + '</td><td>' + r.date + '</td><td>' + r.reName + '</td>';
              html += '<td>' + (r.weather || '') + '</td><td>' + (r.efficiency || '-') + '</td>';
              html += '<td><span class="badge ' + r.status + '">' + r.status + '</span></td>';
              html += '<td><button class="btn view" data-id="' + r.id + '">View</button>';
              if (r.status === 'Pending') {
                html += ' <button class="btn approve" data-id="' + r.id + '">Approve</button>';
              }
              html += '</td></tr>';
            }
          }
          html += '</table>';
          document.getElementById('reportsTable').innerHTML = html;

          var viewBtns = document.querySelectorAll('[data-id]');
          for (var j = 0; j < viewBtns.length; j++) {
            viewBtns[j].addEventListener('click', function() {
              var id = this.getAttribute('data-id');
              if (this.classList.contains('approve')) { quickApprove(id); }
              else { viewReport(id); }
            });
          }
        })
        .catch(function() {
          document.getElementById('reportsTable').innerHTML = '<p class="error">Failed to load reports.</p>';
        });
    }

    function viewReport(reportId) {
      currentReportId = reportId;
      fetch(API_BASE + '?endpoint=reportDetail&reportId=' + reportId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.success) { alert('Could not load report.'); return; }
          var rp = data.report;
          var h = '<h2 style="color:var(--primary);margin-top:0">' + rp.site + ' - ' + rp.date + '</h2>';
          h += '<div class="meta-grid"><span class="label">RE:</span><span>' + rp.reName + '</span>';
          h += '<span class="label">Weather:</span><span>' + (rp.weatherAM || '') + ' / ' + (rp.weatherPM || '') + '</span>';
          h += '<span class="label">Efficiency:</span><span>' + (rp.efficiency || 'N/A') + '</span></div>';
          h += '<p><strong>Activity Summary:</strong> ' + (rp.activitySummary || '-') + '</p>';

          if (rp.blockStatuses && rp.blockStatuses.length) {
            h += '<div class="section"><h3>Block Status Overview</h3><table><tr><th>Block</th><th>Status</th><th>Target Achievement</th><th>Performance</th></tr>';
            for (var i = 0; i < rp.blockStatuses.length; i++) {
              var b = rp.blockStatuses[i];
              h += '<tr><td>' + (b['Block Name'] || '') + '</td><td>' + (b['Block Status'] || '') + '</td><td>' + (b['Target Achievement'] || '') + '</td><td>' + (b['Performance Status'] || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.tasks && rp.tasks.length) {
            h += '<div class="section"><h3>Work Progress</h3><table><tr><th>Block</th><th>Task</th><th>Unit</th><th>Planned</th><th>Executed</th><th>Daily %</th><th>Cumulative %</th><th>Remarks</th></tr>';
            for (var i = 0; i < rp.tasks.length; i++) {
              var t = rp.tasks[i];
              var dailyPct = (t['Daily Completion %'] != null) ? parseFloat(t['Daily Completion %']).toFixed(1) + '%' : '';
              var cumPct = (t['Overall Completion %'] != null) ? parseFloat(t['Overall Completion %']).toFixed(1) + '%' : '';
              h += '<tr><td>' + (t.Block || '') + '</td><td>' + (t['Task Name'] || '') + '</td><td>' + (t.Unit || '') + '</td>';
              h += '<td>' + (t['Planned QTY'] || '') + '</td><td>' + (t['Executed QTY'] || '') + '</td>';
              h += '<td>' + dailyPct + '</td><td>' + cumPct + '</td><td>' + (t.Remarks || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.workforce && rp.workforce.length) {
            h += '<div class="section"><h3>Workforce</h3><table><tr><th>Type</th><th>Planned</th><th>Available</th><th>Comments</th></tr>';
            for (var i = 0; i < rp.workforce.length; i++) {
              var w = rp.workforce[i];
              h += '<tr><td>' + (w['Labor Type'] || '') + '</td><td>' + (w.Planned || '') + '</td><td>' + (w.Available || '') + '</td><td>' + (w.Comments || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.equipment && rp.equipment.length) {
            h += '<div class="section"><h3>Equipment</h3><table><tr><th>Type</th><th>Qty</th><th>Condition</th><th>Comments</th></tr>';
            for (var i = 0; i < rp.equipment.length; i++) {
              var e = rp.equipment[i];
              h += '<tr><td>' + (e['Equipment Type'] || '') + '</td><td>' + (e.Quantity || '') + '</td><td>' + (e['Working Condition'] || '') + '</td><td>' + (e.Comments || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          function showMat(title, items) {
            if (!items || !items.length) return '';
            var s = '<div class="section"><h3>' + title + '</h3><table><tr><th>Description</th><th>Unit</th><th>Qty</th><th>Block</th></tr>';
            for (var i = 0; i < items.length; i++) {
              var m = items[i];
              s += '<tr><td>' + (m.Description || '') + '</td><td>' + (m.Unit || '') + '</td><td>' + (m.Quantity || '') + '</td><td>' + (m['Allocated Block'] || '') + '</td></tr>';
            }
            return s + '</table></div>';
          }
          h += showMat('Materials Delivered', rp.materialsDelivered);
          h += showMat('Materials On Site', rp.materialsOnSite);

          if (rp.issues && rp.issues.length) {
            h += '<div class="section"><h3>Issues and Delays</h3><table><tr><th>Block</th><th>Details</th></tr>';
            for (var i = 0; i < rp.issues.length; i++) {
              h += '<tr><td>' + (rp.issues[i].Block || '') + '</td><td>' + (rp.issues[i]['Issue Details'] || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.tests && rp.tests.length) {
            h += '<div class="section"><h3>Tests Conducted</h3><table><tr><th>Test</th><th>Block</th><th>Result</th></tr>';
            for (var i = 0; i < rp.tests.length; i++) {
              h += '<tr><td>' + (rp.tests[i].Test || '') + '</td><td>' + (rp.tests[i].Block || '') + '</td><td>' + (rp.tests[i].Result || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.correspondences && rp.correspondences.length) {
            h += '<div class="section"><h3>Correspondences</h3><table><tr><th>Date</th><th>From</th><th>To</th><th>Subject</th></tr>';
            for (var i = 0; i < rp.correspondences.length; i++) {
              var c = rp.correspondences[i];
              h += '<tr><td>' + (c.Date || '') + '</td><td>' + (c.From || '') + '</td><td>' + (c.To || '') + '</td><td>' + (c.Subject || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.safetyIssues && rp.safetyIssues.length) {
            h += '<div class="section"><h3>Safety Issues</h3><table><tr><th>Issue</th><th>Block</th><th>Action Taken</th></tr>';
            for (var i = 0; i < rp.safetyIssues.length; i++) {
              h += '<tr><td>' + (rp.safetyIssues[i].Issue || '') + '</td><td>' + (rp.safetyIssues[i].Block || '') + '</td><td>' + (rp.safetyIssues[i]['Action Taken'] || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.stakeholderContribution && rp.stakeholderContribution.length) {
            h += '<div class="section"><h3>Stakeholder Contribution</h3><table><tr><th>Stakeholder</th><th>Contribution</th></tr>';
            for (var i = 0; i < rp.stakeholderContribution.length; i++) {
              h += '<tr><td>' + (rp.stakeholderContribution[i].Stakeholder || '') + '</td><td>' + (rp.stakeholderContribution[i].Contribution || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.performance && rp.performance.length) {
            h += '<div class="section"><h3>Performance Analysis</h3><p><strong>Efficiency:</strong> ' + (rp.efficiency || 'N/A') + '</p>';
            h += '<table><tr><th>Block</th><th>Target Achievement</th><th>Status</th></tr>';
            for (var i = 0; i < rp.performance.length; i++) {
              h += '<tr><td>' + (rp.performance[i].Block || '') + '</td><td>' + (rp.performance[i]['Daily Target Achievement'] || '') + '</td><td>' + (rp.performance[i].Status || '') + '</td></tr>';
            }
            h += '</table>';
            if (rp.recommendations) {
              h += '<p><strong>Recommendations:</strong></p><pre style="white-space:pre-wrap;font-size:0.85rem">' + rp.recommendations + '</pre>';
            }
            h += '</div>';
          }

          if (rp.siteOrders && rp.siteOrders.length) {
            h += '<div class="section"><h3>Site Orders</h3><table><tr><th>Order No.</th><th>Issued To</th><th>Instruction</th><th>Deadline</th></tr>';
            for (var i = 0; i < rp.siteOrders.length; i++) {
              var o = rp.siteOrders[i];
              h += '<tr><td>' + (o['Order No'] || '') + '</td><td>' + (o['Issued To'] || '') + '</td><td>' + (o.Instruction || '') + '</td><td>' + (o.Deadline || '') + '</td></tr>';
            }
            h += '</table></div>';
          }

          if (rp.holdPointRequests) {
            h += '<div class="section"><h3>Hold-Point Requests</h3><p>' + rp.holdPointRequests + '</p></div>';
          }

          if (rp.photos && rp.photos.length) {
            h += '<div class="section"><h3>Photos</h3><div class="photo-grid">';
            for (var i = 0; i < rp.photos.length; i++) {
              if (rp.photos[i].url) {
                h += '<img src="' + rp.photos[i].url + '" alt="' + (rp.photos[i].block || 'photo') + '" title="' + (rp.photos[i].caption || '') + '">';
              }
            }
            h += '</div></div>';
          }

          document.getElementById('modalContent').innerHTML = h;
          document.getElementById('reportModal').classList.remove('hidden');
          document.getElementById('rejectReason').value = '';
        })
        .catch(function() { alert('Network error loading report.'); });
    }

    function closeModal() {
      document.getElementById('reportModal').classList.add('hidden');
      currentReportId = null;
    }

    function approveReport(id, isReject) {
      var reason = isReject ? document.getElementById('rejectReason').value.trim() : '';
      var email = isReject ? (loggedUser + ' [REJECTED]' + (reason ? ' - ' + reason : '')) : loggedUser;
      fetch(API_BASE, {
        method: 'POST',
        body: JSON.stringify({ action: 'approveReport', reportId: id || currentReportId, directorEmail: email })
      }).finally(function() {
        closeModal();
        loadReports();
      });
    }

    function quickApprove(id) { approveReport(id, false); }
  </script>
</body>
</html>
